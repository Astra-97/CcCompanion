# CcCompanion APNs server 配置模板
# 实际部署 cp config.example.toml config.toml 然后填入真实值
# config.toml 不入 git (已在 .gitignore)

[apns]
# Apple Developer 后台拿
# .p8 文件下载到本机后路径绝对化
p8_path = "~/CcCompanion/apns-server/secrets/AuthKey_XXXXXXXXXX.p8"

# Apple Developer 后台 -> Membership 看 Team ID (10 位字符)
team_id = "XXXXXXXXXX"

# .p8 文件名里的 10 位字符 / 也在 Apple Developer 后台 Keys 页能看
key_id = "XXXXXXXXXX"

# 主 app Bundle ID (跟 Xcode 项目 Bundle Identifier 一致)
# 改成你自己的 bundle id 例 com.yourname.cccompanion
bundle_id = "com.example.cccompanion"

# 沙盒 vs 生产
# Xcode debug build (run from Xcode) 走 sandbox = true
# TestFlight / App Store build 走 sandbox = false
# 真机测试常规走 sandbox 拿 device + Live Activity push token 时 token 是 sandbox-only
sandbox = true

[server]
# 监听地址 默认 127.0.0.1 (内网 only)
# 跨设备访问改 0.0.0.0 + 配 shared_secret 或者用 Tailscale / ZeroTier
host = "127.0.0.1"
port = 8795

# token 持久化路径 (重启后 reload 不丢)
token_store_path = "~/CcCompanion/apns-server/tokens/active.json"

# P0-3: 写接口鉴权 token. 留空则启动时自动生成并写 ~/.ots/secret (mode 0600)。
# 自动生成的 secret 会 log 到控制台，复制到 OTS app onboarding wizard。
# 手动填写可覆盖自动生成。不要 commit 真实密钥到 git。
shared_secret = ""

# P0-1: strict_auth=true 所有写接口必须带 X-Auth-Token 头。
# 默认 true (secure-by-default)。调试时可改 false，上线前改回 true。
strict_auth = true

# P0-1: 允许绑定 0.0.0.0 (公网接口)。默认 false = 仅本机。
# 如果改 true，请确保前置 HTTPS reverse proxy (Caddy/Nginx) + 防火墙已配置。
allow_public_bind = false

# P0-2: 开启远程控制端点 (/chain/abort /chain/restart /chat/regenerate /tmux/send /tmux/capture)。
# 默认 false。只有在同机器跑 Claude Code 且理解风险时才改 true。
# CcCompanion 阉割版用户不需要改此项。
allow_remote_control = false

# IP 访问白名单. 空列表=不限制.
# 可选值例: ["127.0.0.1", "10.0.0.0/8", "192.168.0.0/16", "172.16.0.0/12"]
allowed_ips = []

# default_session sets the tmux session name CcCompanion connects to.
# Change this to match your own tmux session name.
# default_session = "cc"

# CC Companion channel transport for /chat/send.
# 默认关闭。开启后，普通 xiaoke 联系人的 /chat/send 会先 POST 到
# {channel_transport_url}/messages；成功则不再注入 tmux，失败按
# channel_transport_fallback_to_tmux 决定是否回退旧 tmux 注入路径。
# kairos / apples 等特殊联系人不走这个开关。
#
# 安全提示：不要把 8810 裸露到公网。推荐只监听 127.0.0.1，或放在有认证、
# HTTPS、访问控制的内网/reverse proxy 后面。
#
# 使用前需要先独立启动 channel test session / POC 服务，并确保它能处理：
# POST /messages
# Header: X-Auth-Token: COMPANION_CHANNEL_TOKEN
# Body: {message_id, contact_id, text, quoted_ts?, metadata?}
channel_transport_enabled = false
channel_transport_url = "http://127.0.0.1:8810"
channel_transport_token = ""

# 命中的 contact 才会尝试 channel transport。默认只允许 xiaoke。
# 空列表 [] 表示不允许任何 contact，即使 channel_transport_enabled=true 也不会路由。
channel_transport_contacts = ["xiaoke"]

# true: channel 请求失败时自动 fallback 到原 tmux 注入。
# false: channel 请求失败时直接返回 502，并保留已写入的 user history record。
channel_transport_fallback_to_tmux = true
channel_transport_timeout_seconds = 5

[auth]
# Android 首次登录接口 POST /login 使用。
# 不要把真实用户名、密码、GitHub token commit 到仓库；真实值只写本机 config.toml。
username = ""
password = ""

# 返回给 Android 后保存到本地，用于访问私有仓库 Release 检查更新。
ghp_token = ""

# 返回给 Android 的外网 VPS 地址。真实部署可改成当前 HTTPS 域名。
server_url = "https://companion-vps2.xiaonancaleb.xyz"
