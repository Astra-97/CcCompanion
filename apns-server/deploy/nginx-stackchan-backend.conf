server {
    listen 80;
    server_name stackchan-backend.xiaonancaleb.xyz;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name stackchan-backend.xiaonancaleb.xyz;

    ssl_certificate /etc/letsencrypt/live/stackchan-backend.xiaonancaleb.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stackchan-backend.xiaonancaleb.xyz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50m;

    # CC Companion app backend over the direct StackChan HTTPS endpoint.
    # The app should use:
    #   https://stackchan-backend.xiaonancaleb.xyz/companion
    location = /companion {
        return 308 /companion/;
    }

    location /companion/ {
        proxy_pass http://127.0.0.1:8291/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # WebSocket for CC Companion full-duplex voice call (v1.9.34+)
    # Standalone WS server on 127.0.0.1:8765, path /voice-call/stream
    # Client URL: wss://stackchan-backend.xiaonancaleb.xyz/companion/voice-call/stream
    location /companion/voice-call/stream {
        proxy_pass http://127.0.0.1:8765/voice-call/stream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Pass through the X-Auth-Token header (default behavior)
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # WebSocket for xiaozhi
    location /xiaozhi/v1/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # OTA and HTTP API
    location /xiaozhi/ota/ {
        proxy_pass http://127.0.0.1:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /mcp/ {
        proxy_pass http://127.0.0.1:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
